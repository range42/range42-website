<!DOCTYPE html>
<html lang="en"
  x-data="{
    theme: localStorage.getItem('r42-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
  }"
  :data-theme="theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B0F14" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark light">
  <meta name="robots" content="noindex, follow">

  <title>404 Not Found — Range42</title>
  <meta name="description" content="The page you are looking for does not exist. Return to the Range42 homepage.">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <link rel="manifest" href="site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist/output.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js"></script>
</head>

<body class="bg-base text-ink">
  <main class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md text-center">
      <p class="terminal-prompt mb-4">$ range42 --status 404</p>
      <h1 class="text-6xl md:text-7xl font-bold text-ink mb-3 tracking-tight">404</h1>
      <p class="text-lg text-muted leading-relaxed mb-8">
        The page you are looking for doesn&rsquo;t exist — or it has moved to another workspace.
      </p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="/" class="btn-primary justify-center">Go home →</a>
        <a href="getting-started.html" class="btn-secondary justify-center">Read the docs</a>
      </div>
    </div>
  </main>
</body>
</html>
